###############################################################################
# Supabase Analytics (Logflare) - Deployment
# Provides log analytics and querying. Stores logs in PostgreSQL backend.
# Depends on: db
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: supabase
  labels:
    app: supabase
    component: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: analytics
  template:
    metadata:
      labels:
        app: supabase
        component: analytics
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: analytics
          image: supabase/logflare:1.30.3
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: supabase-config
            - secretRef:
                name: supabase-secret
          env:
            - name: LOGFLARE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: LOGFLARE_PRIVATE_ACCESS_TOKEN
            - name: LOGFLARE_SINGLE_TENANT
              value: "true"
            - name: LOGFLARE_SUPABASE_MODE
              value: "true"
            - name: LOGFLARE_MIN_CLUSTER_SIZE
              value: "1"
            - name: DB_DATABASE
              value: "_supabase"
            - name: DB_HOSTNAME
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: "supabase_admin"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: POSTGRES_PASSWORD
            - name: DB_SCHEMA
              value: "_analytics"
            - name: POSTGRES_BACKEND_URL
              value: "postgresql://supabase_admin:$(DB_PASSWORD)@db:5432/postgres"
            - name: POSTGRES_BACKEND_SCHEMA
              value: "_analytics"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
