###############################################################################
# Supabase Vector - Deployment
# Collects logs from all Supabase services and forwards them to the
# analytics (Logflare) backend. Uses a ConfigMap for vector.yml config.
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  namespace: supabase
  labels:
    app: supabase
    component: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: vector
  template:
    metadata:
      labels:
        app: supabase
        component: vector
    spec:
      containers:
        - name: vector
          image: timberio/vector:0.28.1-alpine
          ports:
            - containerPort: 9001
              name: api
              protocol: TCP
          args: []
          envFrom:
            - configMapRef:
                name: supabase-config
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOGFLARE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: LOGFLARE_PRIVATE_ACCESS_TOKEN
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: vector-config
          configMap:
            name: vector-config
---
###############################################################################
# Vector Configuration ConfigMap
# Defines sources, transforms, and sinks for log collection.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: supabase
  labels:
    app: supabase
    component: vector
data:
  vector.yml: |
    api:
      enabled: true
      address: "0.0.0.0:9001"
    sources:
      kubernetes_logs:
        type: kubernetes_logs
        namespace_annotation_fields:
          namespace_labels: ""
        node_annotation_fields:
          node_labels: ""
        pod_annotation_fields:
          pod_annotations: ""
          pod_labels: ""
    transforms:
      supabase_logs:
        type: filter
        inputs:
          - kubernetes_logs
        condition:
          type: vrl
          source: |
            .kubernetes.pod_namespace == "supabase"
      parse_logs:
        type: remap
        inputs:
          - supabase_logs
        source: |
          .component = to_string(.kubernetes.pod_labels.component) ?? "unknown"
          .service = to_string(.kubernetes.pod_labels.app) ?? "unknown"
    sinks:
      logflare:
        type: "http"
        inputs:
          - parse_logs
        uri: "http://analytics:4000/api/logs?source_name=supabase.logs"
        method: "post"
        encoding:
          codec: "json"
        request:
          headers:
            x-api-key: "${LOGFLARE_API_KEY}"
        batch:
          max_bytes: 1048576
          timeout_secs: 1
