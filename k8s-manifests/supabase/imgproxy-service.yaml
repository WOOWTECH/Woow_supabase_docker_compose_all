###############################################################################
# Supabase imgproxy - Service
# Internal service for image processing. Used by the Storage service.
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: imgproxy
  namespace: supabase
  labels:
    app: supabase
    component: imgproxy
spec:
  type: ClusterIP
  selector:
    app: supabase
    component: imgproxy
  ports:
    - name: http
      port: 5001
      targetPort: 5001
      protocol: TCP
