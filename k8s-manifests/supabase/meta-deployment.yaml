###############################################################################
# Supabase Postgres Meta - Deployment
# Provides a REST API for managing PostgreSQL objects (tables, columns,
# roles, policies, etc.). Used by Studio dashboard for DB administration.
# Depends on: db
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta
  namespace: supabase
  labels:
    app: supabase
    component: meta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: meta
  template:
    metadata:
      labels:
        app: supabase
        component: meta
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: meta
          image: supabase/postgres-meta:v0.95.2
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PG_META_PORT
              value: "8080"
            - name: PG_META_DB_HOST
              value: "db"
            - name: PG_META_DB_PORT
              value: "5432"
            - name: PG_META_DB_NAME
              value: "postgres"
            - name: PG_META_DB_USER
              value: "supabase_admin"
            - name: PG_META_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: POSTGRES_PASSWORD
            - name: PG_META_CRYPTO_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: PG_META_CRYPTO_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
