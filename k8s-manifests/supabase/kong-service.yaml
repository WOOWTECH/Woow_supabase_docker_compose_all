###############################################################################
# Supabase Kong API Gateway - Service
# NodePort service exposing the API gateway externally.
# Port 8000 (HTTP) and 8443 (HTTPS) are the main Supabase entry points.
# On k3s, NodePort ranges default to 30000-32767, so we use explicit ports.
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: supabase
  labels:
    app: supabase
    component: kong
spec:
  type: NodePort
  selector:
    app: supabase
    component: kong
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP
