###############################################################################
# Supabase PostgreSQL - StatefulSet
# Core database for all Supabase services. Uses the official Supabase
# Postgres image which includes required extensions (pg_net, pgsodium,
# supautils, etc.) and initialization scripts.
#
# The initdb ConfigMap should contain SQL scripts to bootstrap roles,
# schemas, and extensions required by Supabase services.
###############################################################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: supabase
  labels:
    app: supabase
    component: db
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: db
  template:
    metadata:
      labels:
        app: supabase
        component: db
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ['sh', '-c', 'touch /etc/postgresql-custom/wal-g.conf /etc/postgresql-custom/read-replica.conf /etc/postgresql-custom/supautils.conf']
          volumeMounts:
            - name: db-config
              mountPath: /etc/postgresql-custom
      containers:
        - name: postgres
          image: supabase/postgres:15.8.1.085
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          envFrom:
            - configMapRef:
                name: supabase-config
            - secretRef:
                name: supabase-secret
          env:
            - name: POSTGRES_HOST
              value: /var/run/postgresql
            - name: PGPORT
              value: "5432"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: postgres
            - name: POSTGRES_INITDB_ARGS
              value: "--locale=C.UTF-8"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
            - name: db-config
              mountPath: /etc/postgresql-custom
            - name: initdb-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - supabase_admin
                - -d
                - postgres
                - -h
                - /var/run/postgresql
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - supabase_admin
                - -d
                - postgres
                - -h
                - /var/run/postgresql
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - supabase_admin
                - -d
                - postgres
                - -h
                - /var/run/postgresql
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-data
        - name: db-config
          emptyDir: {}
        - name: initdb-scripts
          configMap:
            name: db-initdb-scripts
            optional: true
      terminationGracePeriodSeconds: 60
---
###############################################################################
# Database Initialization Scripts ConfigMap
# Contains SQL to bootstrap Supabase roles, schemas, and extensions.
# The Supabase Postgres image runs these on first startup.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-initdb-scripts
  namespace: supabase
  labels:
    app: supabase
    component: db
data:
  00-initial-schema.sh: |
    #!/bin/bash
    set -e
    PG_PASS="${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}"
    PG_USER="${POSTGRES_USER:-supabase}"

    echo "=== Creating Supabase roles ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "
      DO \$\$
      DECLARE p TEXT := '$PG_PASS';
      BEGIN
        -- Login roles with password
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='supabase_admin') THEN
          EXECUTE format('CREATE ROLE supabase_admin LOGIN PASSWORD %L SUPERUSER CREATEDB CREATEROLE REPLICATION BYPASSRLS', p);
        ELSE
          EXECUTE format('ALTER ROLE supabase_admin WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='authenticator') THEN
          EXECUTE format('CREATE ROLE authenticator LOGIN PASSWORD %L NOINHERIT', p);
        ELSE
          EXECUTE format('ALTER ROLE authenticator WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='supabase_auth_admin') THEN
          EXECUTE format('CREATE ROLE supabase_auth_admin LOGIN PASSWORD %L NOINHERIT CREATEROLE', p);
        ELSE
          EXECUTE format('ALTER ROLE supabase_auth_admin WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='supabase_storage_admin') THEN
          EXECUTE format('CREATE ROLE supabase_storage_admin LOGIN PASSWORD %L NOINHERIT CREATEROLE', p);
        ELSE
          EXECUTE format('ALTER ROLE supabase_storage_admin WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='supabase_functions_admin') THEN
          EXECUTE format('CREATE ROLE supabase_functions_admin LOGIN PASSWORD %L NOINHERIT CREATEROLE', p);
        ELSE
          EXECUTE format('ALTER ROLE supabase_functions_admin WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='supabase_realtime_admin') THEN
          EXECUTE format('CREATE ROLE supabase_realtime_admin LOGIN PASSWORD %L NOINHERIT', p);
        ELSE
          EXECUTE format('ALTER ROLE supabase_realtime_admin WITH LOGIN PASSWORD %L', p);
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='pgbouncer') THEN
          EXECUTE format('CREATE ROLE pgbouncer LOGIN PASSWORD %L NOINHERIT', p);
        ELSE
          EXECUTE format('ALTER ROLE pgbouncer WITH LOGIN PASSWORD %L', p);
        END IF;
        -- Non-login roles
        PERFORM 1 FROM pg_roles WHERE rolname='anon';
        IF NOT FOUND THEN CREATE ROLE anon NOLOGIN NOINHERIT; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='authenticated';
        IF NOT FOUND THEN CREATE ROLE authenticated NOLOGIN NOINHERIT; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='service_role';
        IF NOT FOUND THEN CREATE ROLE service_role NOLOGIN NOINHERIT BYPASSRLS; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='supabase_read_only_user';
        IF NOT FOUND THEN CREATE ROLE supabase_read_only_user NOLOGIN NOINHERIT; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='dashboard_user';
        IF NOT FOUND THEN CREATE ROLE dashboard_user NOLOGIN NOINHERIT CREATEROLE; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='pgsodium_keyholder';
        IF NOT FOUND THEN CREATE ROLE pgsodium_keyholder NOLOGIN NOINHERIT; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='pgsodium_keyiduser';
        IF NOT FOUND THEN CREATE ROLE pgsodium_keyiduser NOLOGIN NOINHERIT; END IF;
        PERFORM 1 FROM pg_roles WHERE rolname='pgsodium_keymaker';
        IF NOT FOUND THEN CREATE ROLE pgsodium_keymaker NOLOGIN NOINHERIT; END IF;
      END
      \$\$;
    "

    echo "=== Granting role memberships ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "
      GRANT anon, authenticated, service_role, supabase_admin TO authenticator;
      GRANT anon, authenticated, service_role TO supabase_auth_admin;
    "

    echo "=== Creating schemas ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "
      CREATE SCHEMA IF NOT EXISTS auth AUTHORIZATION supabase_auth_admin;
      CREATE SCHEMA IF NOT EXISTS storage AUTHORIZATION supabase_storage_admin;
      CREATE SCHEMA IF NOT EXISTS extensions;
      CREATE SCHEMA IF NOT EXISTS graphql_public;
      CREATE SCHEMA IF NOT EXISTS _realtime;
      CREATE SCHEMA IF NOT EXISTS supabase_functions AUTHORIZATION supabase_functions_admin;
      CREATE SCHEMA IF NOT EXISTS _analytics;
    "

    echo "=== Enabling extensions ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "
      CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\" SCHEMA extensions;
      CREATE EXTENSION IF NOT EXISTS pgcrypto SCHEMA extensions;
      CREATE EXTENSION IF NOT EXISTS pgjwt SCHEMA extensions;
    "

    echo "=== Granting schema permissions ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "
      GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
      GRANT USAGE ON SCHEMA extensions TO anon, authenticated, service_role;
      GRANT ALL ON SCHEMA auth TO supabase_auth_admin;
      GRANT ALL ON SCHEMA storage TO supabase_storage_admin;
      GRANT ALL ON SCHEMA supabase_functions TO supabase_functions_admin;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO anon, authenticated, service_role;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO anon, authenticated, service_role;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO anon, authenticated, service_role;
      GRANT ALL ON SCHEMA public TO supabase_auth_admin;
      GRANT ALL ON SCHEMA public TO supabase_storage_admin;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_auth_admin IN SCHEMA auth GRANT ALL ON TABLES TO postgres, dashboard_user;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_auth_admin IN SCHEMA auth GRANT ALL ON SEQUENCES TO postgres, dashboard_user;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_auth_admin IN SCHEMA auth GRANT ALL ON ROUTINES TO postgres, dashboard_user;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_storage_admin IN SCHEMA storage GRANT ALL ON TABLES TO postgres, dashboard_user;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_storage_admin IN SCHEMA storage GRANT ALL ON SEQUENCES TO postgres, dashboard_user;
      ALTER DEFAULT PRIVILEGES FOR ROLE supabase_storage_admin IN SCHEMA storage GRANT ALL ON ROUTINES TO postgres, dashboard_user;
    "

    echo "=== Creating _supabase database ==="
    psql -v ON_ERROR_STOP=0 -U "$PG_USER" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='_supabase'" | grep -q 1 || \
      psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d postgres -c "CREATE DATABASE _supabase OWNER supabase_admin;"

    echo "=== Creating _analytics schema in _supabase database ==="
    psql -v ON_ERROR_STOP=1 -U "$PG_USER" -d _supabase -c "CREATE SCHEMA IF NOT EXISTS _analytics;"

    echo "=== Supabase DB initialization complete ==="
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-custom-config
  namespace: supabase
  labels:
    app: supabase
    component: db
data:
  wal-g.conf: ""
  read-replica.conf: ""
  supautils.conf: ""
