###############################################################################
# Supabase Realtime - Deployment
# Provides WebSocket-based real-time subscriptions for database changes.
# Depends on: db
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: supabase
  labels:
    app: supabase
    component: realtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: realtime
  template:
    metadata:
      labels:
        app: supabase
        component: realtime
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
      containers:
        - name: realtime
          image: supabase/realtime:v2.72.0
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: supabase-config
            - secretRef:
                name: supabase-secret
          env:
            - name: APP_NAME
              value: "realtime"
            - name: PORT
              value: "4000"
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              value: "supabase_admin"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: POSTGRES_PASSWORD
            - name: DB_AFTER_CONNECT_QUERY
              value: "SET search_path TO _realtime"
            - name: DB_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: VAULT_ENC_KEY
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: JWT_SECRET
            - name: FLY_ALLOC_ID
              value: "fly123"
            - name: FLY_APP_NAME
              value: "realtime"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: SECRET_KEY_BASE
            - name: ERL_AFLAGS
              value: "-proto_dist inet_tcp"
            - name: ENABLE_TAILSCALE
              value: "false"
            - name: DNS_NODES
              value: "''"
            - name: RLIMIT_NOFILE
              value: "10000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
