###############################################################################
# Supabase Supavisor - Service
# NodePort service for external database connections through the pooler.
# Port 5432: Direct/session-mode PostgreSQL connections
# Port 6543: Transaction-mode pooled connections (recommended for apps)
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: supavisor
  namespace: supabase
  labels:
    app: supabase
    component: supavisor
spec:
  type: NodePort
  selector:
    app: supabase
    component: supavisor
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP
    - name: pooler
      port: 6543
      targetPort: 6543
      nodePort: 30543
      protocol: TCP
