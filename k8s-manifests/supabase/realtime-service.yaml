###############################################################################
# Supabase Realtime - Service
# Internal service for WebSocket connections. Accessed by Kong API gateway.
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: realtime
  namespace: supabase
  labels:
    app: supabase
    component: realtime
spec:
  type: ClusterIP
  selector:
    app: supabase
    component: realtime
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
