###############################################################################
# Supabase Secrets
# All sensitive configuration values. Replace placeholder values before
# deploying to production. Values are base64-encoded.
#
# To encode: echo -n 'your-value' | base64
# To decode: echo 'base64string' | base64 -d
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: supabase-secret
  namespace: supabase
  labels:
    app: supabase
type: Opaque
data:
  # PostgreSQL superuser password
  # Plaintext: CHANGE_ME_POSTGRES_PASSWORD
  POSTGRES_PASSWORD: Q0hBTkdFX01FX1BPU1RHUkVTX1BBU1NXT1JE
  # JWT secret used to sign/verify all Supabase tokens (min 32 chars)
  # Plaintext: CHANGE_ME_JWT_SECRET_SUPER_SECRET_MIN_32
  JWT_SECRET: Q0hBTkdFX01FX0pXVF9TRUNSRVRfU1VQRVJfU0VDUkVUX01JTl8zMg==
  # Anonymous (public) JWT - used by client-side code
  # Plaintext: CHANGE_ME_ANON_KEY
  ANON_KEY: Q0hBTkdFX01FX0FOT05fS0VZ
  # Service role JWT - has elevated privileges, server-side only
  # Plaintext: CHANGE_ME_SERVICE_ROLE_KEY
  SERVICE_ROLE_KEY: Q0hBTkdFX01FX1NFUlZJQ0VfUk9MRV9LRVk=
  # Studio dashboard credentials
  # Plaintext: supabase
  DASHBOARD_USERNAME: c3VwYWJhc2U=
  # Plaintext: CHANGE_ME_DASHBOARD_PASSWORD
  DASHBOARD_PASSWORD: Q0hBTkdFX01FX0RBU0hCT0FSRF9QQVNTV09SRA==
  # Logflare API tokens
  # Plaintext: CHANGE_ME_LOGFLARE_PUBLIC_TOKEN
  LOGFLARE_PUBLIC_ACCESS_TOKEN: Q0hBTkdFX01FX0xPR0ZMQVJFX1BVQkxJQ19UT0tFTg==
  # Plaintext: CHANGE_ME_LOGFLARE_PRIVATE_TOKEN
  LOGFLARE_PRIVATE_ACCESS_TOKEN: Q0hBTkdFX01FX0xPR0ZMQVJFX1BSSVZBVEVfVE9LRU4=
  # Erlang/Phoenix secret key base for analytics (min 64 chars)
  # Plaintext: CHANGE_ME_SECRET_KEY_BASE_64_CHARS_MINIMUM_XXXXXXXXXXXXXXXXXXXXXX
  SECRET_KEY_BASE: Q0hBTkdFX01FX1NFQ1JFVF9LRVlfQkFTRV82NF9DSEFSU19NSU5JTVVNX1hYWFhYWFhYWFhYWFhYWFhYWFhYWFg=
  # Vault encryption key for database secrets
  # Plaintext: CHANGE_ME_VAULT_ENC_KEY
  VAULT_ENC_KEY: Q0hBTkdFX01FX1ZBVUxUX0VOQ19LRVk=
  # Postgres Meta crypto key
  # Plaintext: CHANGE_ME_PG_META_CRYPTO_KEY
  PG_META_CRYPTO_KEY: Q0hBTkdFX01FX1BHX01FVEFfQ1JZUFRPX0tFWQ==
