###############################################################################
# Supabase imgproxy - Deployment
# Processes and transforms images on-the-fly for the Storage service.
# Supports WebP detection, resizing, cropping, and format conversion.
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgproxy
  namespace: supabase
  labels:
    app: supabase
    component: imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase
      component: imgproxy
  template:
    metadata:
      labels:
        app: supabase
        component: imgproxy
    spec:
      containers:
        - name: imgproxy
          image: darthsim/imgproxy:v3.30.1
          ports:
            - containerPort: 5001
              name: http
              protocol: TCP
          env:
            - name: IMGPROXY_BIND
              value: ":5001"
            - name: IMGPROXY_LOCAL_FILESYSTEM_ROOT
              value: "/"
            - name: IMGPROXY_USE_ETAG
              value: "true"
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
